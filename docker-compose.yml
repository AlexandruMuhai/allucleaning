services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alluc-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - composer_cache:/root/.composer/cache
    networks:
      - alluc-network
    depends_on:
      db:
        condition: service_healthy

  webserver:
    image: nginx:1.25-alpine
    container_name: alluc-webserver
    restart: unless-stopped
    ports:
      - "7171:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - alluc-network
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: alluc-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-allucleaning}
      POSTGRES_USER: ${DB_USERNAME:-alluc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - alluc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-alluc} -d ${DB_DATABASE:-allucleaning}"]
      interval: 10s
      timeout: 5s
      retries: 5

  node:
    image: node:20-alpine
    container_name: alluc-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - alluc-network
    command: ["sh", "-c", "npm install && npm run build && tail -f /dev/null"]
    depends_on:
      - app

volumes:
  postgres_data:
  composer_cache:

networks:
  alluc-network:
    driver: bridge
